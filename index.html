    // ^ (Reemplaza este bloque con tus 1000 palabras reales) ^

    // --- LÓGICA DE PROCESAMIENTO DE DATOS ---
    const WORDS_PER_BLOCK = 50;
    const QUESTIONS_PER_ROUND = 20;
    let vocabulary = [];
    let blocks = [];

    // Variables de estado del juego
    let currentBlockIndex = -1;
    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;

    const appDiv = document.getElementById('app');

    function init() {
        parseCSV();
        createBlocks();
        renderMenu();
    }

    function parseCSV() {
        const lines = rawCSV.split('\n');
        lines.forEach(line => {
            if (line.includes(',')) {
                // Previene errores si la palabra en español tiene comas entre comillas
                const parts = line.split(','); 
                const en = parts[0].trim();
                const es = parts.slice(1).join(',').replace(/"/g, '').trim();
                if (en && es) vocabulary.push({ en, es });
            }
        });
    }

    function createBlocks() {
        for (let i = 0; i < vocabulary.length; i += WORDS_PER_BLOCK) {
            blocks.push(vocabulary.slice(i, i + WORDS_PER_BLOCK));
        }
    }

    // --- UTILIDADES ---
    // Mezcla un array aleatoriamente (Algoritmo Fisher-Yates)
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // --- LÓGICA DEL JUEGO ---
    function startQuiz(blockIndex) {
        currentBlockIndex = blockIndex;
        score = 0;
        currentQuestionIndex = 0;
        
        // Seleccionamos N preguntas aleatorias de este bloque
        let blockWords = [...blocks[blockIndex]];
        shuffleArray(blockWords);
        currentQuestions = blockWords.slice(0, Math.min(QUESTIONS_PER_ROUND, blockWords.length));
        
        loadQuestion();
    }

    function loadQuestion() {
        const currentWord = currentQuestions[currentQuestionIndex];
        
        // Generar distractores (respuestas incorrectas)
        let options = [currentWord.es];
        let attempts = 0;
        
        while (options.length < 4 && attempts < 100) {
            // Cogemos una palabra aleatoria de todo el vocabulario
            let randomWord = vocabulary[Math.floor(Math.random() * vocabulary.length)];
            if (!options.includes(randomWord.es)) {
                options.push(randomWord.es);
            }
            attempts++;
        }
        
        shuffleArray(options);

        // Renderizar la interfaz
        const progress = `Pregunta ${currentQuestionIndex + 1} de ${currentQuestions.length}`;
        const blockName = `Bloque ${currentBlockIndex + 1}`;

        appDiv.innerHTML = `
            <div class="stats">
                <span>${blockName}</span>
                <span>${progress}</span>
            </div>
            <div class="question-box">${currentWord.en}</div>
            <div class="options-grid">
                ${options.map((opt, i) => `
                    <button class="btn opt-${i}" onclick="checkAnswer('${opt}', '${currentWord.es}', this)">
                        ${opt}
                    </button>
                `).join('')}
            </div>
            <button class="action-btn" onclick="renderMenu()" style="background-color: #eee; margin-top: 30px;">Salir al Menú</button>
        `;
    }

    function checkAnswer(selectedAnswer, correctAnswer, btnElement) {
        const buttons = document.querySelectorAll('.options-grid .btn');
        buttons.forEach(btn => btn.disabled = true); // Bloquear clics

        if (selectedAnswer === correctAnswer) {
            btnElement.classList.add('correct');
            score++;
        } else {
            btnElement.classList.add('wrong');
            // Iluminar la correcta
            buttons.forEach(btn => {
                if (btn.innerText.trim() === correctAnswer) {
                    btn.classList.add('correct');
                }
            });
        }

        // Agregar botón de continuar
        const nextBtn = document.createElement('button');
        nextBtn.className = 'action-btn';
        nextBtn.innerText = currentQuestionIndex < currentQuestions.length - 1 ? 'Siguiente' : 'Ver Resultados';
        nextBtn.onclick = nextQuestion;
        appDiv.appendChild(nextBtn);
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < currentQuestions.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        const percentage = Math.round((score / currentQuestions.length) * 100);
        let message = '';
        if(percentage >= 90) message = '¡Nivel B2 dominado! 🌟';
        else if(percentage >= 70) message = '¡Vas por muy buen camino! 🚀';
        else message = 'Toca repasar este bloque un poco más. 💪';

        appDiv.innerHTML = `
            <h1 style="color:#46178f;">Resultados</h1>
            <div class="big-score">${score} / ${currentQuestions.length}</div>
            <h2>${percentage}% Aciertos</h2>
            <p style="font-size: 1.2em; margin: 20px 0;">${message}</p>
            <button class="action-btn" onclick="startQuiz(${currentBlockIndex})">Repetir Bloque</button>
            <button class="action-btn" onclick="renderMenu()" style="background-color: #eee;">Volver al Menú</button>
        `;
    }

    function renderMenu() {
        appDiv.innerHTML = `
            <div class="menu-title">Vocabulario B2</div>
            <div class="menu-subtitle">Total de palabras cargadas: <b>${vocabulary.length}</b></div>
            <div class="menu-grid">
                ${blocks.map((block, index) => {
                    const startNum = (index * WORDS_PER_BLOCK) + 1;
                    const endNum = startNum + block.length - 1;
                    return `
                        <button class="menu-btn" onclick="startQuiz(${index})">
                            Bloque ${index + 1}<br>
                            <span style="font-size: 0.8em; font-weight: normal;">Palabras ${startNum} - ${endNum}</span>
                        </button>
                    `;
                }).join('')}
            </div>
        `;
    }

    // Iniciar aplicación
    init();

</script>
